{% extends 'core/base.html' %}
{% block title %}Give Feedback – FoodBridge{% endblock %}
{% block content %}
<div style="max-width:520px;margin:0 auto;">
    <div class="page-header">
        <h1>⭐ Give Feedback</h1>
        <a href="{% url 'receiver_dashboard' %}" class="btn btn-outline">← Back</a>
    </div>
    <div class="card">
        <p style="margin-bottom:1.5rem;color:var(--gray);">Feedback for: <strong>{{ donation.title }}</strong></p>
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label>Rating</label>
                {{ form.rating }}
            </div>
            <div class="form-group">
                <label>Comment</label>
                {{ form.comment }}
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">Submit Feedback</button>
        </form>
    </div>
</div>
{% endblock %}
